<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERVE AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --owner: #f59e0b;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(99, 102, 241, 0.2);
            --glow: rgba(99, 102, 241, 0.4);
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Анимированный фон */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
            pointer-events: none;
            z-index: -1;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Навигация */
        .nav {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        
        .nav-logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(99, 102, 241, 0.5);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .nav-logo::before {
            content: '🧠';
            font-size: 1.8rem;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Контейнер */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }
        
        /* Чат */
        .chat-container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                        0 0 40px rgba(99, 102, 241, 0.1);
            transition: all 0.3s ease;
        }
        
        .chat-container:hover {
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5),
                        0 0 60px rgba(99, 102, 241, 0.2);
        }
        
        .chat-header {
            padding: 1.5rem 2rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(236, 72, 153, 0.1));
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #chatTitle {
            font-weight: 600;
            font-size: 1.1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #accessIndicator {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        #accessIndicator.owner {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.5);
            color: var(--owner);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
            50% { box-shadow: 0 0 30px rgba(245, 158, 11, 0.5); }
        }
        
        /* Сообщения */
        .chat-messages {
            height: 500px;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: var(--bg);
            border-radius: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
        }
        
        .message {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideIn {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .message.user .message-avatar {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }
        
        .message.ai .message-avatar {
            background: linear-gradient(135deg, var(--secondary), #db2777);
            box-shadow: 0 4px 20px rgba(236, 72, 153, 0.4);
        }
        
        .message-content {
            max-width: 70%;
            padding: 1.25rem 1.75rem;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }
        
        .message.ai .message-content {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 6px;
            backdrop-filter: blur(10px);
        }
        
        .message.ai.owner .message-content {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.4);
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.2);
        }
        
        /* Ввод сообщения */
        .chat-input {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.5);
        }
        
        .input-wrapper {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .input-wrapper input {
            flex: 1;
            padding: 1rem 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.8);
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        
        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        
        .send-btn:hover:not(:disabled) {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }
        
        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Кнопка входа */
        .login-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, var(--bg-card), #334155);
            padding: 2.5rem;
            border-radius: 24px;
            max-width: 450px;
            width: 90%;
            border: 1px solid var(--border);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5),
                        0 0 60px rgba(99, 102, 241, 0.2);
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(30px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }
        
        .modal-content h2 {
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.8rem;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.8);
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        
        /* Уведомления */
        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 3000;
            animation: slideInRight 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        
        @keyframes slideInRight {
            from { 
                opacity: 0; 
                transform: translateX(400px) scale(0.9); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0) scale(1); 
            }
        }
        
        .notification.success { 
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        .notification.error { 
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .notification.info { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        
        /* Код */
        pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 12px;
            overflow-x: auto;
            margin: 0.75rem 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        code {
            color: #22c55e;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
        }
        
        /* Печать ИИ */
        .typing {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.875rem;
            padding: 0.75rem 2rem;
            display: none;
        }
        
        .typing.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .nav {
                padding: 1rem;
            }
            
            .container {
                padding: 80px 15px 30px;
            }
            
            .chat-messages {
                height: 400px;
            }
            
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo">NERVE AI</div>
        <button id="loginBtn" class="login-btn" onclick="showLogin()">🔐 Вход</button>
    </nav>
    
    <div class="container">
        <div class="chat-container">
            <div class="chat-header">
                <span id="chatTitle">Чат с NERVE AI</span>
                <span id="accessIndicator">● User</span>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message ai">
                    <div class="message-avatar">🧠</div>
                    <div class="message-content">Готов к работе. Введите запрос.</div>
                </div>
            </div>
            
            <div class="typing" id="typing">🤖 NERVE AI печатает...</div>
            
            <div class="chat-input">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Введите запрос..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>🔐 Вход</h2>
            <div class="form-group">
                <label>Ключ владельца</label>
                <input type="password" id="ownerKey" placeholder="Введите ключ">
            </div>
            <button onclick="login()" class="login-btn" style="width: 100%;">Войти</button>
            <p style="text-align: center; margin-top: 1rem; font-size: 0.875rem; color: var(--text-muted);">
                Режим OWNER: полная свобода, без цензуры
            </p>
        </div>
    </div>
    
    <div id="notifications"></div>
    
    <script>
        let isOwner = false;
        
        const savedOwner = localStorage.getItem('nerve_is_owner');
        if (savedOwner === 'true') {
            isOwner = true;
            updateUI();
        }
        
        function showLogin() {
            document.getElementById('loginModal').classList.add('active');
        }
        
        function hideLogin() {
            document.getElementById('loginModal').classList.remove('active');
        }
        
        function updateUI() {
            if (isOwner) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('accessIndicator').textContent = '● OWNER';
                document.getElementById('accessIndicator').className = 'owner';
                document.getElementById('chatTitle').textContent = 'NERVE AI • OWNER';
            }
        }
        
        function showNotification(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'notification ' + type;
            div.textContent = msg;
            document.getElementById('notifications').appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        
        async function login() {
            const ownerKey = document.getElementById('ownerKey').value;
            
            if (!ownerKey) {
                showNotification('Введите ключ владельца', 'error');
                return;
            }
            
            if (ownerKey === 'nerve_boss') {
                isOwner = true;
                localStorage.setItem('nerve_is_owner', 'true');
                updateUI();
                hideLogin();
                showNotification('Добро пожаловать, Хозяин!', 'success');
            } else {
                showNotification('Неверный ключ', 'error');
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const typing = document.getElementById('typing');
            const userMsg = input.value.trim();
            
            if (!userMsg) return;
            
            addMessage(userMsg, 'user');
            input.value = '';
            
            sendBtn.disabled = true;
            input.disabled = true;
            typing.classList.add('active');
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: userMsg, 
                        is_owner: isOwner 
                    })
                });
                
                const data = await response.json();
                
                typing.classList.remove('active');
                addMessage(data.answer, 'ai', isOwner);
                
            } catch (e) {
                typing.classList.remove('active');
                addMessage('⚠️ Ошибка: ' + e.message, 'ai');
            }
            
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
        }
        
        function addMessage(html, type, isOwnerMode = false) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message ' + type + (isOwnerMode ? ' owner' : '');
            
            const avatar = type === 'user' ? '👤' : '🧠';
            
            let formatted = html;
            if (formatted.includes('```')) {
                formatted = formatted.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            }
            formatted = formatted.replace(/\n/g, '<br>');
            
            div.innerHTML = '<div class="message-avatar">' + avatar + '</div><div class="message-content">' + formatted + '</div>';
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>

</html>
